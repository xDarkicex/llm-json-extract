name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / perl-${{ matrix.perl }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        perl: ['5.34', '5.36', '5.38', '5.40']

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@381cdd7dc9545d888416f3b78d00b66ab717ba30 # v1
        with:
          perl-version: ${{ matrix.perl }}

      - name: Install dependencies
        run: |
          cpanm --quiet --notest --installdeps . || true

      - name: Syntax check
        run: perl -c llm-json-extract.pl

      - name: Test suite
        run: prove -lr t

  smoke-linux:
    name: Linux smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@381cdd7dc9545d888416f3b78d00b66ab717ba30 # v1
        with:
          perl-version: '5.38'

      - name: Golden fixture smoke
        run: |
          perl llm-json-extract.pl tests/fixtures/01-basic.in > /tmp/out.json
          diff -u tests/fixtures/01-basic.expected /tmp/out.json

      - name: Big noisy input smoke
        run: |
          perl -e 'print "<json>", ("x</nope>" x 150000), "{\"ok\":1}"' | perl llm-json-extract.pl --extract smart --timeout 2 >/tmp/noisy.out || true

      - name: Timeout contract smoke
        run: |
          perl -e 'print "<json>", ("x</nope>" x 250000), "{\"ok\":1}"' | perl llm-json-extract.pl --extract smart --timeout 1 >/tmp/timeout.out 2>/tmp/timeout.err || true

      - name: Meta envelope contract smoke
        run: |
          printf 'no json here' | perl llm-json-extract.pl --meta > /tmp/meta.json || true
          perl -MJSON::PP -e 'my $s=do{local $/;<>}; my $o=JSON::PP->new->decode($s); die "missing ok" unless exists $o->{ok}; die "missing version" unless exists $o->{version};' /tmp/meta.json
